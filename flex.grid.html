<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>flex_grid 비교연습용</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <style>
        /* 내부스타일시트 작성위치 */
        /* 공통 */
        .contents {
            width: 400px; margin: 30px auto;
            border: 2px solid black; 
        }
        .contents img {width: 100%;}
        .contents .quiz {background-color: yellow;}
        .contents .info {background-color: pink;}
        /* flex */
        .flex {
            display: flex; /* quiz + info 정렬위한준비 */
            gap:10px;
        }
        .flex .quiz { flex:1; /* width: 50%; */
            display: flex; /* h2+ol+btn 정렬하고자하는대상의 부모에게  */
            flex-flow: row wrap;
        } 
        .flex .quiz > * {width: 50%;}
        .flex .quiz h2 { background:lime;}
        .flex .quiz ol { background: aqua;}
        .flex .quiz #btn { background: orange; height: 50px;}
        .flex .info { flex:1; /* width: 50%; */} 
        /* grid */
        .grid {
            display: grid; /* quiz + info 정렬위한준비 */
            grid-template-columns: 1fr 1fr;  /* 50% 50% /자동범위조절  */
            /* grid-template-columns: 100px 1fr; (열) */
            /* grid-template-rows: 100px 200px;  (행) */
            gap:10px;
        }
        .grid .quiz {
            display: grid; /* h2+ol+btn 정렬하고자하는대상의 부모에게  */
            /* grid-template-columns: 1fr 1fr; /* 2열 일정비율 */
            /* grid-template-rows: 1fr 50px; */
            grid-template-areas: 
                'title list' 
                'btn .';  /* . -> 빈칸 */
            grid-template-columns: 50px 1fr; /* 크기 */
            grid-template-rows: 1fr 150px;
        }
        .grid .quiz h2 {grid-area:title; background: lime;}
        .grid .quiz ol {grid-area:list; background: aqua;}
        .grid .quiz #btn {grid-area:btn; background: orange;}
        .grid .info {}
        /* 
        정렬 자식이 2개이상이고 한 방향(수평,수직)으로만 정렬 -> flex + grid
        정렬 자식이 3개이상이고 반응형 기기에 따라 재배열이 자유 -> grid
        */
    </style>
</head>
<body>
    <div class="contents flex">
        <div class="quiz">
            <h2>퀴즈제목</h2>
            <ol>
                <li>30</li>
                <li>40</li>
                <li>50</li>
            </ol>
            <button type="button" id="btn">제출</button>
        </div>
        <div class="info">
            <img src="./images/quiz_contents.png" alt="">
            <p>업데이트</p>
        </div>
    </div>
    <div class="contents grid">
        <div class="quiz">
            <h2>퀴즈제목</h2>
            <ol>
                <li>30</li>
                <li>40</li>
                <li>50</li>
            </ol>
            <button type="button" id="btn">제출</button>
        </div>
        <div class="info">
            <img src="./images/quiz_contents.png" alt="">
            <p>업데이트</p>
        </div>
    </div>
</body>
</html>
